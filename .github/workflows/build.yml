name: Build Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Instalar Maven
        run: sudo apt-get install -y maven

      - name: Baixar e instalar Cobblemon no Maven local
        run: |
          curl -L "https://cdn.modrinth.com/data/MdwFAVRL/versions/5nE4XVTV/Cobblemon-fabric-1.7.3%2B1.21.1.jar" -o cobblemon.jar
          mvn install:install-file \
            -Dfile=cobblemon.jar \
            -DgroupId=com.cobblemon \
            -DartifactId=fabric \
            -Dversion=1.7.3+1.21.1 \
            -Dpackaging=jar

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Upload do .jar
        uses: actions/upload-artifact@v4
        with:
          name: cobblemon-type-starter-1.0.0
          path: build/libs/cobblemon-type-starter-1.0.0.jar
          if-no-files-found: error
